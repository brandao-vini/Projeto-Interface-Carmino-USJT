<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HABIT – Assinar Newsletter</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a href="index.html" class="site-logo" aria-label="HABIT – Página inicial">HABIT</a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="destaques.html">Páginas</a>
        <a href="destaques.html">Destaques</a>
        <a href="assinar.html" aria-current="page">Assinar</a>
        <a href="admin-categorias.html" class="nav-admin">Admin</a>
      </nav>
      <div class="header-search">
        <label for="busca-header" class="sr-only">Buscar</label>
        <input
          type="search"
          id="busca-header"
          name="q"
          placeholder="Buscar..."
          aria-label="Campo de busca"
        />
        <a href="busca.html" class="btn btn-outline btn-sm">Buscar</a>
        <a href="entrar.html" class="btn btn-outline btn-sm">Entrar</a>
      </div>
    </div>
  </header>

  <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
  <main id="conteudo-principal">
    <div class="wrapper">

      <!-- Centralização vertical/horizontal do formulário -->
      <div style="display:flex;justify-content:center;padding:var(--space-2xl) 0;">
        <div style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-xl);width:100%;max-width:420px;">

          <h1 class="mb-lg"> Assine a newsletter </h1>

          <!-- Formulário de assinatura -->
          <div role="form" aria-label="Formulário de assinatura da newsletter">

            <div class="field">
              <label for="email-newsletter">E-mail</label>
              <input
                type="email"
                id="email-newsletter"
                name="email"
                placeholder="E-mail"
                autocomplete="email"
                required
                aria-required="true"
              />
            </div>

            <div class="checkbox-group mb-md">
              <input
                type="checkbox"
                id="aceite-privacidade"
                name="aceite"
                required
                aria-required="true"
              />
              <label for="aceite-privacidade">
                <a href="#"></a>Concordo em receber comunicações e li a política de privacidade</a>.
              </label>
            </div>

            <button type="button" class="btn btn-primary">Assinar</button>

          </div>

        </div>
      </div>

    </div><!-- /wrapper -->
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer" role="contentinfo">
    <nav class="footer-links" aria-label="Links do rodapé">
      <a href="#">Instagram</a>
      <a href="#">Work</a>
      <a href="#">Bags</a>
      <a href="#">Lamp</a>
      <a href="#">Books</a>
    </nav>
    <p class="footer-copy">© 2026 Habit • <a href="#">Habit 2026</a></p>
  </footer>

</body>
</html>
