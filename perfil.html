<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HABIT – Perfil</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a href="index.html" class="site-logo" aria-label="HABIT – Página inicial">HABIT</a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="destaques.html">Páginas</a>
        <a href="destaques.html">Destaques</a>
        <a href="assinar.html">Assinar</a>
        <a href="admin-categorias.html" class="nav-admin">Admin</a>
      </nav>
      <div class="header-search">
        <label for="busca-header" class="sr-only">Buscar</label>
        <input
          type="search"
          id="busca-header"
          name="q"
          placeholder="Buscar..."
          aria-label="Campo de busca"
        />
        <a href="busca.html" class="btn btn-outline btn-sm">Buscar</a>
        <a href="entrar.html" class="btn btn-outline btn-sm">Entrar</a>
      </div>
    </div>
  </header>

  <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
  <main id="conteudo-principal">
    <div class="wrapper">
      <div style="display:grid; grid-template-columns:220px 1fr; gap:var(--space-lg); align-items:start; padding:var(--space-xl) 0;">

        <!-- ===== COLUNA ESQUERDA: Perfil ===== -->
        <aside aria-labelledby="perfil-titulo">
          <div style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-lg);">

            <h2 id="perfil-titulo" style="font-size:var(--text-base);font-weight:700;margin-bottom:var(--space-md);">Perfil</h2>

            <!-- Avatar placeholder -->
            <div
              style="background:var(--color-card-bg);border-radius:var(--radius-sm);width:100%;aspect-ratio:4/3;margin-bottom:var(--space-md);"
              role="img"
              aria-label="Foto de perfil do usuário"
            ></div>

            <!-- Formulário de perfil -->
            <div role="form" aria-label="Editar perfil">

              <div class="field">
                <label for="perfil-nome" class="sr-only">Nome</label>
                <input
                  type="text"
                  id="perfil-nome"
                  name="nome"
                  placeholder="Nome"
                  autocomplete="name"
                />
              </div>

              <div class="field">
                <label for="perfil-bio" class="sr-only">Bio</label>
                <input
                  type="text"
                  id="perfil-bio"
                  name="bio"
                  placeholder="Bio"
                />
              </div>

              <button type="button" class="btn btn-primary">Salvar</button>

            </div>
          </div>
        </aside>

        <!-- ===== COLUNA DIREITA: Suas Postagens ===== -->
        <section aria-labelledby="postagens-titulo">
          <h1 id="postagens-titulo" style="font-size:var(--text-2xl);margin-bottom:var(--space-lg);">Suas Postagens</h1>

          <div style="display:flex;flex-direction:column;gap:var(--space-md);">

            <!-- Post 1 – Rascunho -->
            <article style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;gap:var(--space-md);padding:var(--space-md);align-items:center;">
              <div
                style="background:var(--color-card-bg);width:80px;height:64px;border-radius:var(--radius-sm);flex-shrink:0;"
                role="img"
                aria-label="Imagem do Post 1"
              ></div>
              <div>
                <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px;">Rascunho</p>
                <h2 style="font-size:var(--text-base);font-weight:700;">
                  <a href="#" style="color:var(--color-text);text-decoration:none;">Post 1</a>
                </h2>
              </div>
            </article>

            <!-- Post 2 – Publicado -->
            <article style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;gap:var(--space-md);padding:var(--space-md);align-items:center;">
              <div
                style="background:var(--color-card-bg);width:80px;height:64px;border-radius:var(--radius-sm);flex-shrink:0;"
                role="img"
                aria-label="Imagem do Post 2"
              ></div>
              <div>
                <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px;">Publicado</p>
                <h2 style="font-size:var(--text-base);font-weight:700;">
                  <a href="#" style="color:var(--color-text);text-decoration:none;">Post 2</a>
                </h2>
              </div>
            </article>

            <!-- Comentário 1 – Em análise -->
            <article style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;gap:var(--space-md);padding:var(--space-md);align-items:center;">
              <div
                style="background:var(--color-card-bg);width:80px;height:64px;border-radius:var(--radius-sm);flex-shrink:0;"
                role="img"
                aria-label="Imagem do Comentário 1"
              ></div>
              <div>
                <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px;">Em análise</p>
                <h2 style="font-size:var(--text-base);font-weight:700;">
                  <a href="#" style="color:var(--color-text);text-decoration:none;">Comentário 1</a>
                </h2>
              </div>
            </article>

            <!-- Comentário 2 – Publicado -->
            <article style="background:var(--color-bg-white);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;gap:var(--space-md);padding:var(--space-md);align-items:center;">
              <div
                style="background:var(--color-card-bg);width:80px;height:64px;border-radius:var(--radius-sm);flex-shrink:0;"
                role="img"
                aria-label="Imagem do Comentário 2"
              ></div>
              <div>
                <p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px;">Publicado</p>
                <h2 style="font-size:var(--text-base);font-weight:700;">
                  <a href="#" style="color:var(--color-text);text-decoration:none;">Comentário 2</a>
                </h2>
              </div>
            </article>

          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer" role="contentinfo">
    <nav class="footer-links" aria-label="Links do rodapé">
      <a href="#">Instagram</a>
      <a href="#">Work</a>
      <a href="#">Bags</a>
      <a href="#">Lamp</a>
      <a href="#">Books</a>
    </nav>
    <p class="footer-copy">© 2026 Habit • <a href="#">Habit 2026</a></p>
  </footer>

  <!-- Responsividade extra para o layout de perfil -->
  <style>
    @media (max-width: 640px) {
      main .wrapper > div {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

</body>
</html>
